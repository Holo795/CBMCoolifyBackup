name: Build & publish images

# Builds the agent and controller images and pushes them to GitHub Container
# Registry (ghcr.io/<owner>/cbm-agent and cbm-controller).
#
# Production images are tied to GitHub Releases: publishing a release builds and
# pushes :X.Y.Z, :X.Y and :latest for that version. Pushes to main (when there
# is no release) only move a rolling :edge tag — so :latest never changes under
# users until a new release is cut.
on:
  release:
    types: [published]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cbm-agent
            dockerfile: Dockerfile.agent
          - name: cbm-controller
            dockerfile: Dockerfile.controller
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the owner for us (ghcr requires it).
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
