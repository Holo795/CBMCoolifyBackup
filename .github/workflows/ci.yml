name: CI

# Runs the same checks CONTRIBUTING.md asks contributors to run locally, on every
# pull request to main (and on pushes to main). Required to pass before merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # postinstall generates the Prisma client (needed for the controller type-check)
      - name: Install
        run: npm ci

      - name: Build shared types
        run: npm run build:shared

      - name: Unit tests (shared + agent)
        run: npm test

      - name: Unit tests (controller)
        run: npm run test --workspace @cbm/controller

      - name: Type-check controller
        run: npx tsc --noEmit -p packages/controller/tsconfig.json
